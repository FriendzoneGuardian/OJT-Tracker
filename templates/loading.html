<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OJT-Tracker | Initializing</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <style>
        body { background-color: #09090b; color: #fafafa; font-family: 'Inter', sans-serif; overflow: hidden; }
        .scarlet-glow { box-shadow: 0 0 20px rgba(204, 0, 0, 0.2); }
        .bar-animation {
            width: 0%;
            animation: load 3.5s ease-in-out forwards;
        }
        @keyframes load {
            0%   { width: 0%; }
            10%  { width: 8%; }
            30%  { width: 35%; }
            55%  { width: 62%; }
            75%  { width: 80%; }
            90%  { width: 88%; }
            100% { width: 92%; } /* Hold here until real handshake */
        }
        #bar-fill {
            box-shadow: 0 0 8px rgba(220, 38, 38, 0.6);
            transition: box-shadow 0.5s ease;
        }
        #bar-fill.pulse {
            box-shadow: 0 0 16px rgba(220, 38, 38, 0.9), 0 0 4px rgba(255, 80, 80, 0.5);
        }
        #phase-label {
            transition: opacity 0.4s ease;
        }
    </style>
</head>
<body class="flex items-center justify-center h-screen">
    <div class="text-center w-full max-w-md px-10">
        <h1 class="text-3xl font-bold mb-1 tracking-tighter text-white">OJT-TRACKER</h1>
        <p class="text-zinc-600 text-xs mb-6 font-mono tracking-widest uppercase">v1.8.0 &mdash; Chart Surgeon</p>
        <p class="text-zinc-500 text-sm mb-8 font-mono" id="phase-label">CALIBRATING TEMPORAL ENGINES...</p>
        
        <div class="w-full h-1.5 bg-zinc-900 rounded-full overflow-hidden border border-zinc-800 relative" id="bar-track">
            <div class="h-full bg-red-700 bar-animation rounded-full" id="bar-fill"></div>
        </div>
        
        <div id="status" class="mt-4 text-xs text-zinc-600 italic transition-opacity duration-300">
            "Timing is everything." — FriendzoneGuardian
        </div>
    </div>

    <script>
        const quotes = [
            "Reticulating Splines... but for Interns.",
            "Calculating how much sleep you've lost...",
            "Avoiding the 'Black Screen of Death'...",
            "Convincing Python that 0.001 equals zero...",
            "Removing rose gold filters... by 💅 Support's demand.",
            "Hiding the database from 💅 The Inquirer...",
            "Calibrating the 'Clockwork' heart...",
            "Polishing heatmaps until they bleed scarlet...",
            "Downloading more RAM for the Sidecar...",
            "Consulting the Ramsey Protocol for sassy advice...",
            "Teaching the Bat (Night Owl) how to read a clock...",
            "Normalizing your Afternoon coffee intake...",
            "Syncing with the Great Grandfather Clock...",
            "Ignoring boss emails during boot sequence...",
            "Wait, did I leave the oven on? No, just Flask.",
            "Optimizing temporal intensity gradients...",
            "De-bloating your productivity guilt...",
            "Initializing the 'Vibecoding' buffer...",
            "Ensuring your internship isn't a simulation...",
            // v1.8.0 Chart Surgeon additions
            "Evicting Seaborn from the premises...",
            "Installing Chart.js... it's lighter, we promise.",
            "Drawing scarlet bars on a canvas...",
            "Loading 4 chart views for your viewing pleasure...",
            "Calculating your EXP bar. RANK: APPRENTICE.",
            "Printing your proof of existence on thermal paper...",
            "Formatting hours to H:MM so math is optional...",
            "Consulting the RPG Intern Council...",
            "Checking if you're GRINDING or IDLE today...",
            "Area charts are cooler than pie charts. Fact.",
            "Monthly breakdown loading... no spoilers.",
            "Configuring the 486-hour target. It won't cheat.",
        ];

        const phases = [
            "[Phase 1] Validating Database Schema...",
            "[Phase 2] Running Clockwork Migrations...",
            "[Phase 3] Preserving Temporal Archives...",
            "[Phase 4] Synchronizing Holidays...",
            "[Phase 5] Loading Chart.js Canvas...",
            "[Phase 6] Warmup Complete. Awaiting Handshake...",
        ];

        const statusEl = document.getElementById('status');
        const phaseEl = document.getElementById('phase-label');
        const barFill = document.getElementById('bar-fill');
        
        let phaseIdx = 0;
        const phaseInterval = setInterval(() => {
            if (phaseIdx < phases.length) {
                phaseEl.style.opacity = 0;
                setTimeout(() => {
                    phaseEl.textContent = phases[phaseIdx++];
                    phaseEl.style.opacity = 1;
                }, 200);
            } else {
                clearInterval(phaseInterval);
                // Pulse the bar when done
                barFill.classList.add('pulse');
            }
        }, 700);
        
        function rotateQuote() {
            statusEl.style.opacity = 0;
            setTimeout(() => {
                const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
                statusEl.textContent = `"${randomQuote}" — The Shell`;
                statusEl.style.opacity = 1;
            }, 300);
        }

        setInterval(rotateQuote, 1800);
        // Initial random start
        rotateQuote();
    </script>
</body>
</html>
