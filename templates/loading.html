<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OJT-Tracker | Initializing</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <style>
        body { background-color: #09090b; color: #fafafa; font-family: 'Inter', sans-serif; overflow: hidden; }
        .scarlet-glow { box-shadow: 0 0 20px rgba(204, 0, 0, 0.2); }
        #bar-fill {
            width: 0%;
            box-shadow: 0 0 8px rgba(220, 38, 38, 0.6);
            transition: width 0.6s ease-in-out, box-shadow 0.5s ease;
        }
        #bar-fill.pulse {
            box-shadow: 0 0 16px rgba(220, 38, 38, 0.9), 0 0 4px rgba(255, 80, 80, 0.5);
        }
        #phase-label {
            transition: opacity 0.4s ease;
        }
    </style>
</head>
<body class="flex items-center justify-center h-screen">
    <div class="text-center w-full max-w-md px-10">
        <h1 class="text-3xl font-bold mb-1 tracking-tighter text-white">OJT-TRACKER</h1>
        <p class="text-zinc-600 text-xs mb-6 font-mono tracking-widest uppercase">v1.9.4 &mdash; Voluntary Breaks</p>
        <p class="text-zinc-500 text-sm mb-8 font-mono" id="phase-label">CALIBRATING TEMPORAL ENGINES...</p>
        
        <div class="w-full h-1.5 bg-zinc-900 rounded-full overflow-hidden border border-zinc-800 relative" id="bar-track">
            <div class="h-full bg-red-700 rounded-full" id="bar-fill"></div>
        </div>
        
        <div id="status" class="mt-4 text-xs text-zinc-600 italic transition-opacity duration-300">
            "Timing is everything." — FriendzoneGuardian
        </div>
    </div>

    <script>
        // v1.9.4: Compartmentalized Quote Engine
        const fallbackQuotes = [
            "Reticulating Splines... but for Interns.",
            "Calculating how much sleep you've lost...",
            "Consulting the Ramsey Protocol for sassy advice...",
            "Better Late Than Never Rendering...",
            "Warning: Intern might be running on 10% caffeine and 90% panic."
        ];

        let quotes = [];
        try {
            quotes = window.__electron_ipc.getLoadingQuotes();
            if (quotes.length === 0) quotes = fallbackQuotes;
        } catch (e) {
            quotes = fallbackQuotes;
        }

        const phases = [
            { label: "[Phase 1] Validating Database Schema...", progress: 15 },
            { label: "[Phase 2] Running Clockwork Migrations...", progress: 30 },
            { label: "[Phase 3] Preserving Temporal Archives...", progress: 50 },
            { label: "[Phase 4] Synchronizing Holidays...", progress: 70 },
            { label: "[Phase 5] Loading Chart.js Canvas...", progress: 85 },
            { label: "[Phase 6] Warmup Complete. Awaiting Handshake...", progress: 95 },
        ];

        const statusEl = document.getElementById('status');
        const phaseEl = document.getElementById('phase-label');
        const barFill = document.getElementById('bar-fill');
        
        let phaseIdx = 0;
        const phaseInterval = setInterval(() => {
            if (phaseIdx < phases.length) {
                const phase = phases[phaseIdx++];
                phaseEl.style.opacity = 0;
                setTimeout(() => {
                    phaseEl.textContent = phase.label;
                    barFill.style.width = phase.progress + '%';
                    phaseEl.style.opacity = 1;
                }, 200);
            } else {
                clearInterval(phaseInterval);
                barFill.classList.add('pulse');
            }
        }, 800);
        
        let recentQuotes = [];
        function rotateQuote() {
            statusEl.style.opacity = 0;
            setTimeout(() => {
                let availableQuotes = quotes.filter(q => !recentQuotes.includes(q));
                const randomQuote = availableQuotes[Math.floor(Math.random() * availableQuotes.length)];
                
                statusEl.textContent = `"${randomQuote}" — The Shell`;
                statusEl.style.opacity = 1;

                recentQuotes.push(randomQuote);
                if (recentQuotes.length > 5) {
                    recentQuotes.shift(); // Maintain 5-message cooldown
                }
            }, 300);
        }

        setInterval(rotateQuote, 5000);
        // Initial random start
        rotateQuote();
    </script>
</body>
</html>
